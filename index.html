<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:10px;
}

h2{
text-align:center;
margin-bottom:10px;
}

.loginBox{
text-align:center;
margin-bottom:15px;
}

input{
padding:8px;
font-size:16px;
width:150px;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
background:#3b82f6;
color:white;
font-size:12px;
}

.board{
display:grid;
grid-template-columns: repeat(3,1fr);
gap:8px;
}

.day{
background:#1e293b;
border-radius:8px;
padding:6px;
height:170px;
display:flex;
flex-direction:column;
}

.date{
font-size:11px;
text-align:center;
color:#cbd5f5;
margin-bottom:4px;
}

.confirm{
font-size:11px;
color:#22c55e;
line-height:1.3;
}

.waiting{
font-size:11px;
color:#f59e0b;
line-height:1.3;
}

.separator{
border-top:2px solid red;
margin:4px 0;
}

.btnRow{
margin-top:auto;
display:flex;
gap:4px;
}

.cancel{
background:#ef4444;
}

</style>

</head>


<body>

<h2>LP-ALP Leave Planning</h2>


<div class="loginBox" id="loginBox">

<input id="empNo" placeholder="Employee No">

<button onclick="login()">Login</button>

</div>


<div class="board" id="board"></div>


<script>

let employee=""
let adminMode=false


function login(){

employee=document.getElementById("empNo").value

if(employee=="9999"){
adminMode=true
}

document.getElementById("loginBox").style.display="none"

loadBoard()

}



function loadBoard(){

let board=document.getElementById("board")

board.innerHTML=""

let start=new Date()

for(let i=0;i<60;i++){

let d=new Date()

d.setDate(start.getDate()+i)

let date=d.toISOString().split("T")[0]

let confirm=[]
let waiting=[]

let div=document.createElement("div")

div.className="day"

div.innerHTML=

"<div class='date'>"+date+"</div>"+

"<div class='confirm'>"+
confirm.join("<br>")+
"</div>"+

"<div class='separator'></div>"+

"<div class='waiting'>"+
waiting.join("<br>")+
"</div>"+

"<div class='btnRow'>"+
"<button onclick=\"applyLeave('"+date+"')\">Apply</button>"+
(adminMode ? "<button class='cancel'>Cancel</button>" : "")+
"</div>"

board.appendChild(div)

}

}



function applyLeave(date){

alert("Apply leave for "+date)

}

</script>


</body>
</html>
